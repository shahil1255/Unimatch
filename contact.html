<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniMatch - Contact Us</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    
    <!-- Sidebar -->
    <div id="sidebar" class="sidebar">
        <div style="text-align:right; padding: 10px;">
            <i class="fa-solid fa-times menu-btn" onclick="toggleMenu()"></i>
        </div>
        <ul class="menu-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="programs.html">Programs</a></li>
            <li><a href="profile.html">Profile</a></li>
            <li><a href="application.html">Application</a></li>
            <li><a href="contact.html">Contact Us</a></li>
        </ul>
    </div>

    <!-- Navbar -->
    <nav>
        <div class="logo">
            <i class="fa-solid fa-bars menu-btn" onclick="toggleMenu()"></i>
            <a href="index.html" class="logo"><i class="fa-solid fa-graduation-cap"></i> Uni<span>Match</span></a>
        </div>
        <ul class="nav-links" id="nav-links"></ul>
    </nav>

    <div class="container">
        <h2>Contact Us</h2>
        <div class="grid" style="margin-top: 20px;">
            <div class="card">
                <h3>Get in touch</h3>
                <form id="contact-form" style="margin-top: 20px;">
                    <div class="form-group">
                        <label>Your Name</label>
                        <input type="text" required>
                    </div>
                    <div class="form-group">
                        <label>Your Email</label>
                        <input type="email" required>
                    </div>
                    <div class="form-group">
                        <label>Message</label>
                        <textarea rows="5" required style="width: 100%; border-radius: 5px; padding: 10px; background: rgba(0,0,0,0.5); color: white; border: 1px solid #444;"></textarea>
                    </div>
                    <button type="submit" class="btn">Send Message</button>
                </form>
            </div>
            
            <div class="card" style="text-align: center; display: flex; flex-direction: column; justify-content: center; align-items: center;">
                <h3>Or Reach Out Directly</h3>
                <p style="margin: 20px 0;">We are available 24/7 on WhatsApp: <br><strong style="font-size: 1.2rem; color: #25D366;">01744731415</strong></p>
                <a href="https://wa.me/01744731415" target="_blank" class="btn" style="background: #25D366; display: flex; align-items: center; gap: 10px; font-size: 1.2rem;">
                    <i class="fa-brands fa-whatsapp"></i> Chat on WhatsApp
                </a>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script>
        document.getElementById('contact-form').addEventListener('submit', (e) => {
            e.preventDefault();
            alert('Your message has been sent successfully! We will get back to you shortly.');
            e.target.reset();
        });
    </script>
</body>
</html>
