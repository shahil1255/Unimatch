<body>

    </nav>

    <div class="container">
        <h2>Find Programs</h2>
        <div class="card" style="margin-bottom: 30px;">
            <form id="search-form" class="grid">
                <div class="form-group">
                    <label>Degree</label>
                    <select id="degree">
                        <option value="">Any</option>
                        <option value="BSc">BSc</option>
                        <option value="Masters">Masters</option>
                        <option value="PhD">PhD</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Field of Study</label>
                    <select id="field">
                        <option value="">Any Field</option>
                        <option value="Computer Science">Computer Science</option>
                        <option value="Software Engineering">Software Engineering</option>
                        <option value="Cyber Security">Cyber Security</option>
                        <option value="Data Science">Data Science</option>
                        <option value="MBA">MBA</option>
                        <option value="BBA">BBA</option>
                        <option value="Nursing">Nursing</option>
                        <option value="Pharmacy">Pharmacy</option>
                        <option value="Architecture">Architecture</option>
                        <option value="Law">Law</option>
                        <option value="Fine Arts">Fine Arts</option>
                        <option value="International Relations">International Relations</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Your CGPA</label>
                    <select id="cgpa">
                        <option value="">Any</option>
                        <option value="2.0">2.00</option>
                        <option value="2.3">2.30</option>
                        <option value="2.5">2.50</option>
                        <option value="2.7">2.70</option>
                        <option value="3.0">3.00</option>
                        <option value="3.3">3.30 (B+)</option>
                        <option value="3.5">3.50 (A-)</option>
                        <option value="3.67">3.67 (A)</option>
                        <option value="3.7">3.70 (A)</option>
                        <option value="3.87">3.87 (A+)</option>
                        <option value="4.0">4.00 (A+)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>IELTS Score (Optional)</label>
                    <select id="ielts">
                        <option value="">Any</option>
                        <option value="5.0">5.0</option>
                        <option value="5.5">5.5</option>
                        <option value="6.0">6.0</option>
                        <option value="6.5">6.5</option>
                        <option value="7.0">7.0</option>
                        <option value="7.5">7.5</option>
                        <option value="8.0">8.0</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>MIO Score</label>
                    <select id="mio">
                        <option value="">Any</option>
                        <option value="50">50+</option>
                        <option value="60">60+</option>
                        <option value="70">70+</option>
                        <option value="80">80+</option>
                        <option value="90">90+</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Country</label>
                    <select id="country">
                        <option value="">Any Country</option>
                        <option>USA</option><option>UK</option><option>Canada</option>
                        <option>Australia</option><option>Germany</option><option>France</option>
                        <option>Japan</option><option>South Korea</option><option>Singapore</option>
                        <option>Netherlands</option><option>Sweden</option><option>Norway</option>
                        <option>Denmark</option><option>Finland</option><option>Switzerland</option>
                        <option>Austria</option><option>Belgium</option><option>Italy</option>
                        <option>Spain</option><option>Portugal</option><option>New Zealand</option>
                        <option>Ireland</option><option>Poland</option><option>Czech Republic</option>
                        <option>Hungary</option><option>Romania</option><option>Bulgaria</option>
                        <option>Greece</option><option>Turkey</option><option>UAE</option>
                        <option>Qatar</option><option>Saudi Arabia</option><option>Egypt</option>
                        <option>South Africa</option><option>Nigeria</option><option>Kenya</option>
                        <option>Ghana</option><option>Ethiopia</option><option>Tanzania</option>
                        <option>Uganda</option><option>India</option><option>China</option>
                        <option>Pakistan</option><option>Bangladesh</option><option>Sri Lanka</option>
                        <option>Nepal</option><option>Malaysia</option><option>Indonesia</option>
                        <option>Philippines</option><option>Thailand</option><option>Vietnam</option>
                        <option>Myanmar</option><option>Cambodia</option><option>Laos</option>
                        <option>Mongolia</option><option>Kazakhstan</option><option>Uzbekistan</option>
                        <option>Kyrgyzstan</option><option>Tajikistan</option><option>Azerbaijan</option>
                        <option>Georgia</option><option>Armenia</option><option>Ukraine</option>
                        <option>Belarus</option><option>Moldova</option><option>Lithuania</option>
                        <option>Latvia</option><option>Estonia</option><option>Slovakia</option>
                        <option>Slovenia</option><option>Croatia</option><option>Serbia</option>
                        <option>Bosnia</option><option>Albania</option><option>North Macedonia</option>
                        <option>Kosovo</option><option>Montenegro</option><option>Cyprus</option>
                        <option>Malta</option><option>Luxembourg</option><option>Iceland</option>
                        <option>Jamaica</option><option>Trinidad</option><option>Barbados</option>
                        <option>Cuba</option><option>Dominican Republic</option><option>Haiti</option>
                        <option>Guatemala</option><option>Honduras</option><option>El Salvador</option>
                        <option>Nicaragua</option><option>Costa Rica</option><option>Panama</option>
                        <option>Colombia</option><option>Venezuela</option><option>Ecuador</option>
                        <option>Peru</option><option>Bolivia</option><option>Paraguay</option>
                        <option>Uruguay</option><option>Chile</option><option>Argentina</option>
                        <option>Brazil</option><option>Mexico</option><option>Morocco</option>
                        <option>Algeria</option>
                    </select>
                </div>
                <div class="form-group" style="display: flex; align-items: flex-end;">
                    <button type="submit" class="btn" style="width: 100%;">🔍 Search</button>
                </div>
            </form>
        </div>

        <h3 id="results-headline" style="margin-bottom: 15px;"></h3>
        <div id="results" class="grid" style="margin-top: 10px;">
            <p style="color:#aaa; text-align:center;">Use the filters above to find your matching programs.</p>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script>
        let applyMsg = document.createElement('div');
        applyMsg.id = 'apply-msg';
        applyMsg.style = 'position: fixed; bottom: 30px; right: 30px; padding: 15px 25px; border-radius: 10px; font-weight: bold; display: none; z-index: 999;';
        document.body.appendChild(applyMsg);

        function showMsg(text, success) {
            applyMsg.innerText = text;
            applyMsg.style.background = success ? '#28a745' : '#dc3545';
            applyMsg.style.color = 'white';
            applyMsg.style.display = 'block';
            setTimeout(() => { applyMsg.style.display = 'none'; }, 3500);
        }

        document.getElementById('search-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const params = new URLSearchParams();
            const degree = document.getElementById('degree').value;
            const field = document.getElementById('field').value;
            const cgpa = document.getElementById('cgpa').value;
            const ielts = document.getElementById('ielts').value;
            const country = document.getElementById('country').value;
            const mio = document.getElementById('mio').value;

            if (degree) params.append('degree', degree);
            if (field) params.append('field', field);
            if (cgpa) params.append('cgpa', cgpa);
            if (ielts) params.append('ielts', ielts);
            if (country) params.append('country', country);
            if (mio) params.append('mio', mio);

            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<p style="color:#aaa; text-align:center;">Searching...</p>';

            try {
                const res = await fetch(`/api/universities/search?${params.toString()}`);
                
                if (!res.ok) {
                    const errorData = await res.json();
                    throw new Error(errorData.error || `Server responded with ${res.status}`);
                }

                const data = await res.json();
                resultsDiv.innerHTML = '';
                
                if (data.isFallback) {
                    document.getElementById('results-headline').innerHTML = `<i class="fa-solid fa-circle-info" style="color:#ffcc00"></i> No exact matches found. Showing <span style="color:#ffcc00">Recommended Programs</span> for you:`;
                } else {
                    document.getElementById('results-headline').innerText = data.results.length > 0 ? `Found ${data.results.length} programs matching your criteria` : '';
                }

                if (!data.results || data.results.length === 0) {
                    resultsDiv.innerHTML = '<p style="color:#aaa; text-align:center;">No programs available at this time. Try again later.</p>';
                    return;
                }

                data.results.forEach(uni => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <h3 style="font-size:1.1rem; color:#4da6ff;">${uni.name}</h3>
                        <p><i class="fa-solid fa-location-dot" style="color:#ff4d4d;"></i> <strong>${uni.city}, ${uni.country}</strong></p>
                        <p style="font-size:0.85rem; color:#aaa; margin-bottom:10px;">${uni.address}</p>
                        <p><strong><i class="fa-solid fa-graduation-cap"></i> Program:</strong> ${uni.degree} in ${uni.field}</p>
                        <p><strong><i class="fa-solid fa-clock"></i> Duration:</strong> ${uni.duration}</p>
                        <p><strong><i class="fa-solid fa-money-bill-wave"></i> Tuition:</strong> $${uni.tuitionCost.toLocaleString()}/year</p>
                        <p style="margin-top:5px;"><strong>Requirements:</strong> CGPA: ${uni.minCgpa} | IELTS: ${uni.minIelts || 'N/A'} | MIO: ${uni.minMio || '50'}</p>
                        <button class="btn" style="margin-top: 15px; width: 100%; border-radius:8px;" onclick="applyToUni('${uni._id}', this)">Apply Now</button>
                    `;
                    resultsDiv.appendChild(card);
                });
            } catch (err) {
                console.error('Fetch Error:', err);
                resultsDiv.innerHTML = `<div class="card" style="border: 1px solid #dc3545; text-align:center;">
                                            <p style="color:#dc3545;"><strong>Search Error:</strong> ${err.message}</p>
                                            <p style="font-size:0.9rem; color:#aaa; margin-top:10px;">Make sure the server is running on Port 5000.</p>
                                         </div>`;
            }
        });

        async function applyToUni(id, btn) {
            btn.disabled = true;
            btn.innerText = 'Applying...';
            try {
                const res = await fetch('/api/applications/apply', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ universityId: id })
                });
                const data = await res.json();
                if (res.ok) {
                    btn.innerText = '✅ Applied';
                    btn.style.background = '#28a745';
                    showMsg('🎉 Application submitted successfully!', true);
                } else if (res.status === 401) {
                    btn.disabled = false;
                    btn.innerText = 'Apply Now';
                    showMsg('⚠️ Please login first to apply!', false);
                    setTimeout(() => window.location.href = 'login.html', 1500);
                } else {
                    btn.disabled = false;
                    btn.innerText = 'Apply Now';
                    showMsg(data.error || 'Failed to apply.', false);
                }
            } catch (err) {
                btn.disabled = false;
                btn.innerText = 'Apply Now';
                showMsg('Server error. Try again later.', false);
            }
        }
    </script>
</body>
</html>
