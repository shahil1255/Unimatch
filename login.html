<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniMatch - Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="auth-body">
        <div class="card" style="width: 100%; max-width: 400px;">
            <div style="text-align: center; margin-bottom: 20px;">
                <h2>Welcome Back</h2>
                <p>Login to UniMatch</p>
            </div>
            
            <div id="alert" class="alert"></div>

            <form id="login-form">
                <div class="form-group">
                    <label>Name or Email</label>
                    <input type="text" id="email" required placeholder="Enter name or email">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                <div class="form-group" style="display: flex; align-items: center; gap: 10px;">
                    <input type="checkbox" id="terms" required style="width: auto;">
                    <label for="terms" style="margin: 0; font-size: 0.9rem;">I accept the Terms & Conditions</label>
                </div>
                <button type="submit" class="btn" style="width: 100%;">Login</button>
                <div style="text-align: right; margin-top: 10px;">
                    <a href="forgot.html" style="color: #4da6ff; font-size: 0.9rem;">Forgot password?</a>
                </div>
            </form>
            
            <div style="text-align: center; margin-top: 15px;">
                <p>Don't have an account? <a href="register.html" style="color: #4da6ff;">Register</a></p>
                <p style="margin-top: 10px;"><a href="index.html" style="color: #ccc;">Back to Home</a></p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const alertBox = document.getElementById('alert');

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                let data;
                try {
                    data = await res.json();
                } catch (e) {
                    data = { error: 'Invalid server response' };
                }

                if(res.ok) {
                    alertBox.className = 'alert success';
                    alertBox.innerText = 'Login successful! Redirecting...';
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1000);
                } else {
                    alertBox.className = 'alert error';
                    if (res.status === 503) {
                        alertBox.innerText = 'Database is offline. Please try again in a few minutes.';
                    } else {
                        alertBox.innerText = data.error || 'Login failed. Please check your credentials.';
                    }
                }
            } catch(err) {
                console.error('Fetch error:', err);
                alertBox.className = 'alert error';
                alertBox.innerText = 'Cannot connect to server. Is the backend running?';
            }
        });
    </script>
</body>
</html>
