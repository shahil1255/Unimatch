<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniMatch - My Applications</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .status-badge {
            display: inline-block;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }
        .status-Pending { background: rgba(255,193,7,0.15); color: #ffc107; border: 1px solid #ffc107; }
        .status-Accepted { background: rgba(40,167,69,0.15); color: #28a745; border: 1px solid #28a745; }
        .status-Rejected { background: rgba(220,53,69,0.15); color: #dc3545; border: 1px solid #dc3545; }
        .app-card-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }
        .no-apps {
            text-align: center;
            padding: 60px 20px;
            color: #aaa;
        }
        .no-apps i { font-size: 3rem; margin-bottom: 15px; color: #4da6ff; }
        .no-apps h3 { margin-bottom: 10px; color: white; }
    </style>
</head>
<body>

    <!-- Sidebar -->
    <div id="sidebar" class="sidebar">
        <div style="text-align:right; padding: 10px;">
            <i class="fa-solid fa-times menu-btn" onclick="toggleMenu()"></i>
        </div>
        <ul class="menu-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="programs.html">Programs</a></li>
            <li><a href="profile.html">Profile</a></li>
            <li><a href="application.html">Application</a></li>
            <li><a href="contact.html">Contact Us</a></li>
        </ul>
    </div>

    <!-- Navbar -->
    <nav>
        <div class="logo">
            <i class="fa-solid fa-bars menu-btn" onclick="toggleMenu()"></i>
            <a href="index.html" class="logo"><i class="fa-solid fa-graduation-cap"></i> Uni<span>Match</span></a>
        </div>
        <ul class="nav-links" id="nav-links"></ul>
    </nav>

    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; margin-bottom: 10px;">
            <h2>My Applications</h2>
            <a href="programs.html" class="btn" style="font-size: 0.9rem;">+ Apply to More Universities</a>
        </div>
        <p style="color:#aaa; margin-bottom: 25px;">Track the status of all your university applications below.</p>

        <div id="loading" style="text-align:center; color:#aaa; padding: 40px;">
            <i class="fa-solid fa-spinner fa-spin" style="font-size: 2rem; margin-bottom: 10px;"></i>
            <p>Loading your applications...</p>
        </div>
        <div id="applications" class="grid" style="margin-top: 10px;"></div>
    </div>

    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const res = await fetch('/api/applications/my-applications');
                document.getElementById('loading').style.display = 'none';
                
                if (!res.ok) {
                    window.location.href = 'login.html';
                    return;
                }

                const apps = await res.json();
                const appDiv = document.getElementById('applications');

                if (apps.length === 0) {
                    appDiv.innerHTML = `
                        <div class="no-apps" style="grid-column: 1/-1;">
                            <i class="fa-solid fa-folder-open"></i>
                            <h3>No Applications Yet</h3>
                            <p>You haven't applied to any universities yet.</p>
                            <a href="programs.html" class="btn" style="margin-top: 20px; display: inline-block;">Browse Programs</a>
                        </div>`;
                    return;
                }

                apps.forEach((app, index) => {
                    const uni = app.university;
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.style.animationDelay = `${index * 0.05}s`;
                    card.innerHTML = `
                        <div class="app-card-top">
                            <h3 style="font-size: 1rem; flex: 1;">${uni.name}</h3>
                            <span class="status-badge status-${app.status}">${app.status}</span>
                        </div>
                        <p><i class="fa-solid fa-location-dot" style="color:#4da6ff;"></i> <strong>${uni.country}</strong></p>
                        <p><strong>Program:</strong> ${uni.degree} in ${uni.field}</p>
                        <p><strong>Duration:</strong> ${uni.duration}</p>
                        <p><strong>Tuition:</strong> $${uni.tuitionCost.toLocaleString()}/yr</p>
                        <p><strong>Min CGPA:</strong> ${uni.minCgpa} ${uni.minIelts > 0 ? `| <strong>Min IELTS:</strong> ${uni.minIelts}` : ''}</p>
                        <hr style="border-color: rgba(255,255,255,0.1); margin: 12px 0;">
                        <p style="font-size: 0.8rem; color:#aaa;"><i class="fa-regular fa-calendar"></i> Applied on: ${new Date(app.createdAt).toLocaleDateString('en-US', {year:'numeric',month:'long',day:'numeric'})}</p>
                    `;
                    appDiv.appendChild(card);
                });
            } catch (err) {
                document.getElementById('loading').innerHTML = '<p style="color:red;">Failed to load applications. Please refresh.</p>';
                console.error(err);
            }
        });
    </script>
</body>
</html>
