<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniMatch - Forgot Password</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="auth-body">
        <div class="card" style="width: 100%; max-width: 400px;">
            <div style="text-align: center; margin-bottom: 20px;">
                <h2>Reset Password</h2>
                <p>Enter your email to reset your password</p>
            </div>
            
            <div id="alert" class="alert"></div>

            <form id="forgot-form">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" required placeholder="john@example.com">
                </div>
                <!-- Since we have no email server right now, we will mock resetting by asking for new password immediately -->
                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" id="new-password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn" style="width: 100%;">Reset Password</button>
            </form>
            
            <div style="text-align: center; margin-top: 15px;">
                <p>Back to <a href="login.html" style="color: #4da6ff;">Login</a></p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('forgot-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const newPassword = document.getElementById('new-password').value;
            const alertBox = document.getElementById('alert');

            try {
                const res = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, newPassword })
                });
                
                const data = await res.json();
                if(res.ok) {
                    alertBox.className = 'alert success';
                    alertBox.innerText = 'Password reset successfully! Redirecting...';
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 1500);
                } else {
                    alertBox.className = 'alert error';
                    alertBox.innerText = data.error || 'Reset failed';
                }
            } catch(err) {
                alertBox.className = 'alert error';
                alertBox.innerText = 'Server error occurred.';
            }
        });
    </script>
</body>
</html>
